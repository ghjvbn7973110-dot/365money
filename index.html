<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>365天存錢挑戰</title>
    <script src="cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg-color: #FFFDF0;
            --primary-orange: #FF9800;
            --accent-yellow: #FFEB3B;
            --text-brown: #5D4037;
            --card-white: #FFFFFF;
        }

        body {
            font-family: "Quicksand", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-brown);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-weight: 900; font-size: 2rem; margin: 0; color: var(--primary-orange); }
        .sub-title { font-size: 0.95rem; color: #8D6E63; margin-top: 5px; }

        /* 統計看板 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%; max-width: 500px;
            background: var(--card-white); border-radius: 25px;
            padding: 20px; box-shadow: 0 8px 20px rgba(255, 152, 0, 0.1);
            margin-bottom: 25px;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.75rem; color: #A1887F; margin-bottom: 5px; display: block; }
        .stat-val { font-weight: 900; font-size: 1.1rem; color: var(--primary-orange); }

        /* 隨機按鈕盤 */
        .random-panel {
            width: 100%; max-width: 500px; background: #FFCC80;
            padding: 30px 20px; border-radius: 30px; text-align: center;
            margin-bottom: 30px; box-shadow: 0 10px 0 #EF6C00;
        }
        .draw-display {
            font-size: 4rem; font-weight: 900; color: white;
            text-shadow: 2px 2px 0 #E65100; height: 100px; line-height: 100px;
            margin-bottom: 15px; background: rgba(255,255,255,0.2); border-radius: 20px;
        }
        .btn-draw {
            background: white; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; color: #EF6C00;
            border-radius: 50px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 0 #FFE0B2;
        }
        .btn-draw:active { transform: translateY(3px); box-shadow: 0 2px 0 #FFE0B2; }
        .btn-draw:disabled { background: #eee; color: #ccc; cursor: not-allowed; box-shadow: none; }

        /* 數字網格 */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 8px; width: 100%; max-width: 800px;
            background: var(--card-white); padding: 20px;
            border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .day-box {
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            background: #FFF9C4; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s; border: 1px solid #FFF176;
            color: #795548;
        }
        .day-box.active {
            background: var(--primary-orange); color: white;
            text-decoration: line-through; border-color: #E65100;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .day-box:hover { transform: scale(1.05); }

        .reset-link { margin-top: 30px; font-size: 0.8rem; color: #CCC; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ 365天存錢挑戰 ✨</h1>
        <div class="sub-title">每天存下一點點，夢想就會實現！</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">累積金額</span>
            <span class="stat-val" id="totalAmount">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">完成天數</span>
            <span class="stat-val" id="totalDays">0 / 365</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">總目標</span>
            <span class="stat-val" style="color: #E65100;">$ 66,795</span>
        </div>
    </div>

    <!-- 隨機抽號盤 -->
    <div class="random-panel">
        <div class="draw-display" id="drawValue">Ready?</div>
        <button class="btn-draw" id="drawBtn" onclick="drawNumber()">抽一個數字!</button>
        <div id="finishMsg" style="color:white; margin-top:10px; display:none;">🎉 太棒了！全部數字都抽完囉！</div>
    </div>

    <!-- 手動選取網格 -->
    <div class="grid-container" id="grid">
        <!-- 數字格 1-365 -->
    </div>

    <div class="reset-link" onclick="resetAll()">重新開始挑戰</div>

<script>
    const STORAGE_KEY = '365_savings_v2025';
    let completedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function init() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        for (let i = 1; i <= 365; i++) {
            const box = document.createElement('div');
            box.className = 'day-box' + (completedData.includes(i) ? ' active' : '');
            box.id = `box-${i}`;
            box.textContent = i;
            box.onclick = () => toggleNumber(i);
            grid.appendChild(box);
        }
        updateStats();
        checkDrawBtn();
    }

    // 手動點擊切換
    function toggleNumber(num) {
        const index = completedData.indexOf(num);
        if (index > -1) {
            completedData.splice(index, 1);
        } else {
            completedData.push(num);
        }
        saveAndRefresh();
    }

    // 隨機抽號邏輯
    function drawNumber() {
        // 找出還沒被選取的數字
        const remaining = [];
        for (let i = 1; i <= 365; i++) {
            if (!completedData.includes(i)) remaining.push(i);
        }

        if (remaining.length === 0) return;

        const btn = document.getElementById('drawBtn');
        const display = document.getElementById('drawValue');
        btn.disabled = true;

        // 跑馬燈特效
        let counter = 0;
        const timer = setInterval(() => {
            display.textContent = Math.floor(Math.random() * 365) + 1;
            counter++;
            if (counter > 20) {
                clearInterval(timer);
                const finalNum = remaining[Math.floor(Math.random() * remaining.length)];
                display.textContent = finalNum;
                completedData.push(finalNum);
                
                // 特效
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FF9800', '#FFEB3B', '#FFFFFF'] });
                
                saveAndRefresh();
                btn.disabled = false;
            }
        }, 50);
    }

    function saveAndRefresh() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(completedData));
        init();
    }

    function updateStats() {
        const sum = completedData.reduce((a, b) => a + b, 0);
        document.getElementById('totalAmount').textContent = `$ ${sum.toLocaleString()}`;
        document.getElementById('totalDays').textContent = `${completedData.length} / 365`;
    }

    function checkDrawBtn() {
        const btn = document.getElementById('drawBtn');
        const msg = document.getElementById('finishMsg');
        if (completedData.length >= 365) {
            btn.style.display = 'none';
            msg.style.display = 'block';
        } else {
            btn.style.display = 'inline-block';
            msg.style.display = 'none';
        }
    }

    function resetAll() {
        if (confirm('確定要清空進度重新開始挑戰嗎？')) {
            completedData = [];
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('drawValue').textContent = "Ready?";
            init();
        }
    }

    init();
</script>
</body>
</html>
